name: package

on:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pre-clone Tracktion Engine with HTTPS submodules
        shell: pwsh
        run: |
          git clone --depth 1 --branch v3.2.0 https://github.com/Tracktion/tracktion_engine.git tracktion_engine-src
          Push-Location tracktion_engine-src
          git submodule update --init --recursive --depth 1
          Pop-Location

      - name: Configure
        run: cmake -S AerionDawCpp -B build -G "Visual Studio 17 2022" -A x64 -DFETCHCONTENT_SOURCE_DIR_TRACKTION_ENGINE="${{ github.workspace }}\\tracktion_engine-src"

      - name: Build
        run: cmake --build build --config Debug --target AerionDaw

      - name: Package (NSIS)
        run: cpack --config build/CPackConfig.cmake -G NSIS -C Debug

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: aerion-windows-installer
          path: "Aerion DAW-*-win64.exe"

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pre-clone Tracktion Engine with HTTPS submodules
        run: |
          git clone --depth 1 --branch v3.2.0 https://github.com/Tracktion/tracktion_engine.git tracktion_engine-src
          cd tracktion_engine-src
          git submodule update --init --recursive --depth 1

      - name: Configure
        run: cmake -S AerionDawCpp -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DFETCHCONTENT_SOURCE_DIR_TRACKTION_ENGINE="$GITHUB_WORKSPACE/tracktion_engine-src"

      - name: Build
        run: cmake --build build --target AerionDaw

      - name: Package (DMG)
        run: cpack --config build/CPackConfig.cmake -G DragNDrop -C Release

      - name: Upload dmg
        uses: actions/upload-artifact@v4
        with:
          name: aerion-macos-dmg
          path: "*.dmg"

