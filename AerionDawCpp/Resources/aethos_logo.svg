<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background: Obsidian Abyss -->
    <rect id="bg" width="1024" height="1024" fill="#050705"/>

    <!-- Cold Blade Steel Gradient -->
    <linearGradient id="blade_steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#cfd8dc"/>
      <stop offset="50%" stop-color="#546e7a"/>
      <stop offset="100%" stop-color="#101410"/>
    </linearGradient>

    <!-- Hellfire Gold / Molten Brass -->
    <linearGradient id="molten_gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff9e0"/>
      <stop offset="45%" stop-color="#D4AF37"/>
      <stop offset="55%" stop-color="#B87333"/>
      <stop offset="100%" stop-color="#4a3a1a"/>
    </linearGradient>

    <!-- Occult Glow -->
    <radialGradient id="vortex_glow" cx="512" cy="512" r="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2E4732" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#050705" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <use href="#bg"/>
  <circle cx="512" cy="512" r="512" fill="url(#vortex_glow)"/>

  <!-- THE 'AE' SIGIL (Blade-inspired Metal Logo) -->
  <g transform="translate(512, 440)">
    <!-- Outer Spiked Ring / Circular Saw Blade influence -->
    <path d="M0 -380 L30 -340 L80 -360 L100 -310 L150 -320 L160 -260 L210 -260 L210 -200 L260 -190 L250 -130 L300 -110 L280 -60 L320 -30 L290 20 L320 70 L280 110 L300 160 L250 180 L260 240 L210 250 L210 310 L160 310 L150 370 L100 360 L80 410 L30 390 L0 430 L-30 390 L-80 410 L-100 360 L-150 370 L-160 310 L-210 310 L-210 250 L-260 240 L-250 180 L-300 160 L-280 110 L-320 70 L-290 20 L-320 -30 L-280 -60 L-300 -110 L-250 -130 L-260 -190 L-210 -200 L-210 -260 L-160 -260 L-150 -320 L-100 -310 L-80 -360 L-30 -340 Z" 
          fill="none" stroke="url(#blade_steel)" stroke-width="2" opacity="0.2"/>
    
    <!-- Central Abstract Sigil: 'A' and 'E' merged as sharp blades -->
    <!-- Simplified 'A' Frame -->
    <path d="M0 -300 L-220 280 L-140 280 L0 -220 L140 280 L220 280 Z" fill="url(#blade_steel)"/>
    
    <!-- Single centered molten gold bar with diagonal cuts -->
    <path d="M-130 85 L130 85 L150 105 L-150 105 Z" fill="url(#molten_gold)"/>

    <!-- Sharp Highlight Edges -->
    <path d="M0 -300 L0 280" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Typography: Sharp Gothic/Blackletter influenced Serif -->
  <g transform="translate(512, 880)">
    <text text-anchor="middle" font-family="Garamond, serif" font-size="140" font-weight="900" fill="url(#blade_steel)" style="letter-spacing: 12px; text-transform: uppercase; filter: drop-shadow(0px 0px 10px rgba(255,255,255,0.1));">AETHOS</text>
    
    <text y="70" text-anchor="middle" font-family="Garamond, serif" font-size="52" font-weight="200" fill="url(#molten_gold)" style="letter-spacing: 42px; text-transform: uppercase; opacity: 0.9;">STUDIO</text>
  </g>

  <!-- Industrial Texture / Scratch Overlay (Subtle) -->
  <g opacity="0.1" stroke="#ffffff" stroke-width="0.5">
    <line x1="100" y1="100" x2="200" y2="150"/>
    <line x1="800" y1="900" x2="900" y2="850"/>
    <line x1="200" y1="800" x2="150" y2="850"/>
    <line x1="700" y1="200" x2="750" y2="150"/>
  </g>
</svg>
