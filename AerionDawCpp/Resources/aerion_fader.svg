<svg width="18" height="48" viewBox="0 0 18 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Realistic dark plastic/metal gradient, now vertical -->
    <linearGradient id="faderBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="20%" stop-color="#2a2a2a"/>
      <stop offset="80%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0e"/>
    </linearGradient>
    
    <!-- Concave top surface shadow to give depth, now rotated -->
    <linearGradient id="innerDepth" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Subtle edge highlight, now rotated -->
    <linearGradient id="edgeHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  
  <!-- Main rectangular body (Upright) -->
  <rect width="18" height="48" rx="1.5" fill="url(#faderBody)"/>
  
  <!-- Concave finger rest area (Upright) -->
  <rect x="0.75" y="1.5" width="16.5" height="45" rx="7.5" fill="url(#innerDepth)"/>
  
  <!-- Side highlights (Upright) -->
  <rect width="18" height="48" rx="1.5" fill="url(#edgeHighlight)" opacity="0.5"/>
  
  <!-- Prominent white indicator line (Now horizontal) -->
  <rect x="1.5" y="23.25" width="15" height="1.5" fill="#ffffff" opacity="0.9"/>
  
  <!-- Slight glow for the indicator line -->
  <rect x="1.5" y="22.5" width="15" height="3" fill="#ffffff" opacity="0.2"/>
</svg>
