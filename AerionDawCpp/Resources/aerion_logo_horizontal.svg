<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" width="100%" height="100%">
  <defs>
    <!-- Metallic Gradient for the 'A' -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2D3748" />
      <stop offset="40%" stop-color="#1C212B" />
      <stop offset="100%" stop-color="#080A0E" />
    </linearGradient>

    <!-- Deep Drop Shadow -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.9"/>
    </filter>

    <!-- Multi-layered Glow for the Ice Blue Pulse -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur1" />
      <feGaussianBlur stdDeviation="15" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="#080A0E" rx="8" />

  <!-- Main 'A' Structure -->
  <path d="M 250 40 L 430 340 L 320 340 L 250 180 L 180 340 L 70 340 Z"
        fill="url(#metalGrad)"
        stroke="#2D3748"
        stroke-width="2"
        filter="url(#dropShadow)" />

  <!-- The Ice Blue Pulse (Base Outer Glow) -->
  <path d="M 130 280 L 215 280 L 250 195 L 285 280 L 370 280"
        fill="none"
        stroke="#3182CE"
        stroke-width="12"
        stroke-linejoin="miter"
        filter="url(#glow)"
        opacity="0.6"/>

  <!-- The Arctic Blue Pulse (Mid Glow) -->
  <path d="M 130 280 L 215 280 L 250 195 L 285 280 L 370 280"
        fill="none"
        stroke="#63B3ED"
        stroke-width="6"
        stroke-linejoin="miter"
        filter="url(#glow)"/>

  <!-- The Polar White Pulse (Core Line) -->
  <path d="M 130 280 L 215 280 L 250 195 L 285 280 L 370 280"
        fill="none"
        stroke="#EBF8FF"
        stroke-width="3"
        stroke-linejoin="miter" />

  <!-- Typography: Aerion DAW (Dynamic Weight & Color) -->
  <text x="480" y="195"
        font-family="'Montserrat', 'Orbitron', 'Segoe UI', 'Helvetica Neue', sans-serif"
        text-anchor="start">
    <tspan font-size="48" font-weight="900" fill="#F0F4F8" letter-spacing="8">AERION</tspan>
    <tspan font-size="48" font-weight="300" fill="#3182CE" letter-spacing="4"> DAW</tspan>
  </text>

  <!-- Typography: By Aethos Studio (Monospace Technical Spec Vibe) -->
  <text x="485" y="245"
        font-family="'Roboto Mono', 'Courier New', monospace"
        font-size="16"
        font-weight="bold"
        fill="#8A99A8"
        letter-spacing="8"
        text-anchor="start">BY AETHOS STUDIO</text>
</svg>
